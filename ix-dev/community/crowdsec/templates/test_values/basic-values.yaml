resources:
  limits:
    cpus: 2.0
    memory: 4096

run_as:
  user: 568
  group: 568

crowdsec:
  image_selector: image
  collections:
    - "crowdsecurity/linux"
  docker_enable: true

network:
  api_port:
    bind_mode: published
    port_number: 8085

ix_volumes:
  db: /opt/tests/mnt/crowdsec/db
  config: /opt/tests/mnt/crowdsec/config

storage:
  db:
    type: ix_volume
    ix_volume_config:
      dataset_name: db
      create_host_path: true
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true
