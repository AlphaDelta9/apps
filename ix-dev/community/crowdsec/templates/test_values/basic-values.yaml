resources:
  limits:
    cpus: 1.0
    memory: 256

run_as:
  user: 568
  group: 568

crowdsec:
  image_selector: image
  collections: "crowdsecurity/linux"
  docker_enable: true

network:
  api_port:
    bind_mode: published
    port_number: 8080

ix_volumes:
  db: /var/tests/lib/crowdsec/data
  config: /etc/tests/crowdsec

storage:
  db:
    type: ix_volume
    ix_volume_config:
      dataset_name: db
      create_host_path: true
  config:
    type: ix_volume
    ix_volume_config:
      dataset_name: config
      create_host_path: true